<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

  import {
    getFirestore,
    doc,
    setDoc,
    getDoc
  } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDvT7SGiN7o-bsL_1Q8jeEhr-__ey9JCAk",
    authDomain: "chamada-duque.firebaseapp.com",
    projectId: "chamada-duque",
    storageBucket: "chamada-duque.firebasestorage.app",
    messagingSenderId: "460760553464",
    appId: "1:460760553464:web:fffe6768e9d2617b10a80d"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  let unidades = {
    'Leões': ['Ana', 'Carlos'],
    'Águias': ['Julia', 'Fernanda']
  };

  let chamadas = [];

  let dataSelecionada = null;

  const meses = [
    'Janeiro','Fevereiro','Março','Abril','Maio','Junho',
    'Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'
  ];

  async function carregarBanco() {
    const docRef = doc(db, "sistema", "dados");
    const docSnap = await getDoc(docRef);

    if (docSnap.exists()) {
      const dados = docSnap.data();

      unidades = dados.unidades || {};
      chamadas = dados.chamadas || [];
    }

    renderUnidades();
    renderChamada();
    carregarRelatorios();
  }

  async function salvarBanco() {
    await setDoc(doc(db, "sistema", "dados"), {
      unidades,
      chamadas
    });
  }

  function iniciar() {
    const hoje = new Date();

    document.getElementById('mesInput').value =
      `${hoje.getFullYear()}-${String(hoje.getMonth()+1).padStart(2,'0')}`;

    gerarCalendario();
    renderUnidades();
    renderChamada();
    carregarRelatorios();

    document.getElementById('mesInput')
      .addEventListener('change', gerarCalendario);
  }

  function gerarCalendario() {
    const valor = document.getElementById('mesInput').value;

    const [ano, mes] = valor.split('-');

    document.getElementById('tituloMes').innerText =
      `${meses[parseInt(mes)-1]} de ${ano}`;

    const calendario = document.getElementById('calendario');

    calendario.innerHTML = `
      <div class="font-bold text-[#31295C] py-2">Dom</div>
      <div class="font-bold text-[#31295C] py-2">Seg</div>
      <div class="font-bold text-[#31295C] py-2">Ter</div>
      <div class="font-bold text-[#31295C] py-2">Qua</div>
      <div class="font-bold text-[#31295C] py-2">Qui</div>
      <div class="font-bold text-[#31295C] py-2">Sex</div>
      <div class="font-bold text-[#31295C] py-2">Sáb</div>
    `;

    const primeiroDia = new Date(ano, mes - 1, 1).getDay();
    const diasMes = new Date(ano, mes, 0).getDate();

    for(let i = 0; i < primeiroDia; i++) {
      calendario.innerHTML += '<div></div>';
    }

    for(let dia = 1; dia <= diasMes; dia++) {
      calendario.innerHTML += `
        <button
          onclick="selecionarDia(${dia}, this)"
          class="dia-btn aspect-square rounded-2xl font-bold min-h-[50px] md:min-h-[75px] text-sm md:text-lg">
          ${dia}
        </button>
      `;
    }
  }

  window.selecionarDia = function(dia, botao) {
    document.querySelectorAll('.dia-btn').forEach(btn => {
      btn.classList.remove('dia-selecionado');
    });

    botao.classList.add('dia-selecionado');

    const valor = document.getElementById('mesInput').value;
    const [ano, mes] = valor.split('-');

    dataSelecionada = `${ano}-${mes}-${String(dia).padStart(2,'0')}`;

    document.getElementById('dataSelecionadaTexto').innerText =
      `Chamada de ${dia}/${mes}/${ano}`;
  }

  function renderUnidades() {
    const container = document.getElementById('unidades');
    container.innerHTML = '';

    Object.keys(unidades).forEach(unidade => {
      container.innerHTML += `
        <div class="border border-zinc-200 rounded-2xl p-4 bg-white shadow-sm">
          <div class="flex items-center justify-between mb-3">
            <h3 class="font-bold text-xl text-[#31295C]">${unidade}</h3>

            <span class="bg-[#DCCB8A] text-[#31295C] px-3 py-1 rounded-full text-sm font-bold">
              ${unidades[unidade].length} membros
            </span>
          </div>

          <div class="flex flex-wrap gap-2 mb-4">
            ${unidades[unidade].map((membro, index) => `
              <div class="bg-[#F4F1FF] border border-[#31295C]/10 text-[#31295C] px-3 py-2 rounded-xl text-sm font-semibold flex items-center gap-2">
                <span>${membro}</span>

                <button onclick="editarMembro('${unidade}', ${index})"
                        class="text-blue-600 hover:text-blue-800">
                  ✏️
                </button>

                <button onclick="excluirMembro('${unidade}', ${index})"
                        class="text-red-600 hover:text-red-800">
                  🗑️
                </button>
              </div>
            `).join('')}
          </div>

          <div class="flex gap-2 mt-3">
            <button onclick="editarUnidade('${unidade}')"
                    class="bg-blue-100 hover:bg-blue-200 text-blue-700 px-4 py-2 rounded-xl text-sm font-bold">
              ✏️ Editar Unidade
            </button>

            <button onclick="excluirUnidade('${unidade}')"
                    class="bg-red-100 hover:bg-red-200 text-red-700 px-4 py-2 rounded-xl text-sm font-bold">
              🗑️ Excluir Unidade
            </button>
          </div>
        </div>
      `;
    });
  }

  window.editarMembro = async function(unidade, index) {
    const novoNome = prompt('Novo nome do membro:', unidades[unidade][index]);

    if(!novoNome) return;

    unidades[unidade][index] = novoNome;

    await salvarBanco();

    renderUnidades();
    renderChamada();
  }

  window.excluirMembro = async function(unidade, index) {
    if(!confirm('Excluir membro?')) return;

    unidades[unidade].splice(index, 1);

    await salvarBanco();

    renderUnidades();
    renderChamada();
  }

  window.editarUnidade = async function(unidade) {
    const novoNome = prompt('Novo nome da unidade:', unidade);

    if(!novoNome || novoNome === unidade) return;

    unidades[novoNome] = unidades[unidade];
    delete unidades[unidade];

    await salvarBanco();

    renderUnidades();
    renderChamada();
  }

  window.excluirUnidade = async function(unidade) {
    if(!confirm('Excluir unidade inteira?')) return;

    delete unidades[unidade];

    await salvarBanco();

    renderUnidades();
    renderChamada();
  }

  function renderChamada() {
    const container = document.getElementById('listaChamada');
    container.innerHTML = '';

    Object.keys(unidades).forEach(unidade => {
      container.innerHTML += `
        <div class="border border-zinc-200 rounded-2xl p-4">
          <h3 class="font-black text-xl text-[#31295C] mb-4">
            ${unidade}
          </h3>

          <div class="grid grid-cols-1 gap-3">
            ${unidades[unidade].map(membro => `
              <button
                onclick="togglePresenca(this)"
                data-membro="${membro}"
                class="membro-ausente rounded-2xl px-4 py-3 text-left font-bold transition-all">
                ${membro}
              </button>
            `).join('')}
          </div>
        </div>
      `;
    });
  }

  window.togglePresenca = function(botao) {
    botao.classList.toggle('membro-presente');
    botao.classList.toggle('membro-ausente');
  }

  window.adicionarMembro = async function() {
    const unidade = document.getElementById('nomeUnidade').value.trim();
    const membro = document.getElementById('nomeMembro').value.trim();

    if(!unidade || !membro) {
      alert('Preencha os campos');
      return;
    }

    if(!unidades[unidade]) {
      unidades[unidade] = [];
    }

    if(!unidades[unidade].includes(membro)) {
      unidades[unidade].push(membro);
    }

    await salvarBanco();

    document.getElementById('nomeUnidade').value = '';
    document.getElementById('nomeMembro').value = '';

    renderUnidades();
    renderChamada();
  }

  window.salvarChamada = async function() {
    if(!dataSelecionada) {
      alert('Selecione um dia no calendário');
      return;
    }

    const presentes = [];
    const ausentes = [];

    document.querySelectorAll('[data-membro]').forEach(btn => {
      const membro = btn.dataset.membro;

      if(btn.classList.contains('membro-presente')) {
        presentes.push(membro);
      } else {
        ausentes.push(membro);
      }
    });

    chamadas.push({
      data: dataSelecionada,
      presentes,
      ausentes
    });

    await salvarBanco();

    carregarRelatorios();

    alert('✅ Chamada salva com sucesso!');
  }

  function carregarRelatorios() {
    const container = document.getElementById('relatorios');
    container.innerHTML = '';

    chamadas.slice().reverse().forEach(chamada => {
      container.innerHTML += `
        <div class="border border-zinc-200 rounded-2xl p-4 bg-white shadow-sm">
          <div class="flex items-center justify-between mb-3 gap-3 flex-wrap">
            <h3 class="font-black text-[#31295C] text-lg">
              ${chamada.data}
            </h3>

            <span class="bg-emerald-100 text-emerald-700 px-3 py-1 rounded-full text-sm font-bold">
              ${chamada.presentes.length} presentes
            </span>
          </div>

          <div class="space-y-2 text-sm">
            <p><strong>✅ Presentes:</strong> ${chamada.presentes.join(', ') || 'Nenhum'}</p>
            <p><strong>❌ Ausentes:</strong> ${chamada.ausentes.join(', ') || 'Nenhum'}</p>
          </div>
        </div>
      `;
    });
  }

  window.baixarRelatorio = function() {
    let texto = 'RELATÓRIO DE CHAMADAS - DUQUE DE CAXIAS\n\n';

    chamadas.forEach(chamada => {
      texto += `Data: ${chamada.data}\n`;
      texto += `Presentes: ${chamada.presentes.join(', ')}\n`;
      texto += `Ausentes: ${chamada.ausentes.join(', ')}\n`;
      texto += `--------------------------------\n\n`;
    });

    const blob = new Blob([texto], { type: 'text/plain' });
    const link = document.createElement('a');

    link.href = URL.createObjectURL(blob);
    link.download = 'relatorio-duque-de-caxias.txt';
    link.click();
  }

  await carregarBanco();
  iniciar();
</script>
