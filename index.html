<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Clube de Desbravadores</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Parisienne&display=swap" rel="stylesheet">

<style>
body {
  background: linear-gradient(to bottom right, #f4f1ff, #ebe8ff);
  font-family: Arial, sans-serif;
  transition: background 0.3s, color 0.3s;
}

.tab {
  padding: 10px 18px;
  border-radius: 12px;
  font-weight: bold;
  cursor: pointer;
  background: #eee;
}

.tab.active {
  background: #31295C;
  color: white;
}

.dia-btn {
  background: #f8f6ff;
  border: 1px solid rgba(49,41,92,.12);
  color: #31295C;
}

.membro-presente {
  background: #bbf7d0;
  border: 2px solid #16a34a;
}

.membro-ausente {
  background: white;
  border: 2px solid #ef4444;
}
.dark-mode {
  background: linear-gradient(to bottom right, #111827, #1f2937);
  color: white;
}

.dark-mode .bg-white {
  background: #1f2937 !important;
  color: white;
  transition: all 0.3s;
}

.dark-mode .tab {
  background: #374151;
  color: white;
}

.dark-mode .tab.active {
  background: #8b5cf6;
}

.dark-mode .dia-btn {
  background: #374151;
  color: white;
  border-color: #4b5563;
}

.dark-mode input {
  background: #374151;
  color: white;
  border-color: #4b5563;
}

.dark-mode details {
  background: #111827;
}

.dark-mode .border {
  border-color: #4b5563 !important;
}

.dark-mode summary,
.dark-mode b,
.dark-mode h1,
.dark-mode h2,
.dark-mode h3 {
  color: white !important;
}
.bg-white,
.tab,
.dia-btn,
button,
input,
details,
.border {
  transition: all 0.3s ease;
}
.dark-mode #rodape {
  color: #d1d5db !important;
}
</style>
</head>

<body>

<div class="max-w-7xl mx-auto p-4 space-y-5">

<!-- HEADER -->
<div class="flex justify-between items-center">

  <h1 class="text-3xl font-black text-[#31295C]">
    Clube de Desbravadores
  </h1>

  <button
    onclick="toggleTema()"
    class="bg-[#31295C] text-white px-4 py-2 rounded-xl">
    🌙
  </button>

</div>

  <div class="flex flex-wrap gap-2 mt-4">
    <button class="tab active" onclick="abrirAba('chamada', event)">Chamada</button>
    <button class="tab" onclick="abrirAba('unidades', event)">Unidades</button>
    <button class="tab" onclick="abrirAba('historico', event)">Chamadas feitas</button>
    <button class="tab" onclick="abrirAba('relatorios', event)">Relatórios</button>
  </div>
</div>

<!-- CHAMADA -->
<div id="aba-chamada">

  <div class="bg-white p-5 rounded-3xl shadow">
    <h2 class="text-xl font-black">📅 Calendário</h2>

    <input type="month" id="mesInput" class="border p-2 rounded w-full my-3"/>

    <div id="calendario" class="grid grid-cols-7 gap-2"></div>
  </div>

  <div class="bg-white p-5 rounded-3xl shadow mt-4">

    <h2 class="text-xl font-black">📋 Chamada do dia</h2>

    <div id="dataSelecionada" class="font-bold my-3">
      Nenhum dia selecionado
    </div>

    <button onclick="toggleUnidades()" class="bg-[#31295C] text-white px-4 py-2 rounded-xl mb-3">
      Abrir / Fechar todas unidades
    </button>

    <div id="listaChamada"></div>

    <button onclick="salvarChamada()" class="w-full mt-4 bg-green-600 text-white py-3 rounded-xl font-bold">
      Salvar chamada
    </button>

  </div>
</div>

<!-- UNIDADES -->
<div id="aba-unidades" class="hidden bg-white p-5 rounded-3xl shadow">

  <h2 class="text-xl font-black">🏕️ Unidades</h2>

  <input id="uNome" placeholder="Unidade" class="border p-2 rounded w-full mb-2"/>
  <input id="mNome" placeholder="Membro" class="border p-2 rounded w-full mb-2"/>

  <button onclick="addMembro()" class="bg-orange-500 text-white px-4 py-2 rounded-xl">
    Adicionar
  </button>

  <div id="unidades" class="mt-4 space-y-4"></div>
</div>

<!-- HISTÓRICO -->
<div id="aba-historico" class="hidden bg-white p-5 rounded-3xl shadow">

  <h2 class="text-xl font-black">📚 Chamadas feitas</h2>
  <div id="historico"></div>

</div>

<!-- RELATÓRIOS -->
<div id="aba-relatorios" class="hidden bg-white p-5 rounded-3xl shadow">

  <h2 class="text-xl font-black">📊 Relatórios</h2>

  <input type="date" id="ini" class="border p-2 rounded w-full mb-2"/>
  <input type="date" id="fim" class="border p-2 rounded w-full mb-2"/>

  <button onclick="visualizarDados()" class="bg-[#31295C] text-white px-4 py-3 rounded-xl w-full">
    Visualizar dados
  </button>

  <div id="resultadoRelatorio" class="mt-4 space-y-4"></div>

</div>

<!-- MODAL -->
<div id="modal" class="fixed inset-0 bg-black/50 hidden items-center justify-center p-4">
  <div class="bg-white w-full max-w-2xl p-5 rounded-2xl max-h-[90vh] overflow-hidden flex flex-col">

    <div class="flex justify-end mb-3">
      <button onclick="fecharModal()">✖</button>
    </div>

    <div id="modalContent" class="overflow-y-auto flex-1 pr-2"></div>

  </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import {
  getFirestore,
  doc,
  onSnapshot,
  setDoc
} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "SUA_API_KEY",
  authDomain: "chamada-duque.firebaseapp.com",
  projectId: "chamada-duque",
  storageBucket: "chamada-duque.firebaseapp.com",
  messagingSenderId: "460760553464",
  appId: "1:460760553464:web:fffe6768e9d2617b10a80d"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const ref = doc(db, "sistema", "dados");

let unidades = {};
let chamadas = [];
let dataSelecionada = null;
let chamadaEditando = null;
let modoEdicao = false;
function ordenarLista(lista){
  return [...lista].sort((a,b)=>
    a.localeCompare(b,'pt-BR',{
      sensitivity:'base'
    })
  );
}

/* FIREBASE */
onSnapshot(ref, snap => {
  if(snap.exists()){
    const d = snap.data();
    unidades = d.unidades || {};
    chamadas = d.chamadas || [];
    renderAll();
  }
});

async function save(){
  await setDoc(ref,{unidades,chamadas});
}

/* ABAS */
window.abrirAba = (aba,e)=>{
  document.querySelectorAll('[id^="aba-"]').forEach(a=>a.classList.add('hidden'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));

  document.getElementById('aba-'+aba).classList.remove('hidden');
  e.target.classList.add('active');
};

/* CALENDÁRIO */
function gerarCalendario(){

  const v = document.getElementById('mesInput').value;
  const [a,m] = v.split('-').map(Number);

  const cal = document.getElementById('calendario');
  cal.innerHTML='';

  const semana = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
  semana.forEach(d=>{
    cal.innerHTML+=`<div class="font-bold text-center">${d}</div>`;
  });

  const primeiro = new Date(a,m-1,1).getDay();
  const total = new Date(a,m,0).getDate();

  for(let i=0;i<primeiro;i++) cal.innerHTML+='<div></div>';

  for(let d=1;d<=total;d++){
    cal.innerHTML+=`
      <button class="dia-btn p-2 rounded-xl"
        onclick="selecionar(${d},this)">
        ${d}
      </button>`;
  }
}

window.selecionar = (d,el)=>{

  document.querySelectorAll('.dia-btn')
    .forEach(b=>b.classList.remove('bg-[#31295C]','text-white'));

  el.classList.add('bg-[#31295C]','text-white');

  const v = document.getElementById('mesInput').value;
  const [a,m] = v.split('-');

  dataSelecionada = `${a}-${m}-${String(d).padStart(2,'0')}`;

  document.getElementById('dataSelecionada').innerText =
    `Selecionado: ${dataSelecionada}`;

  renderChamada();
};

document.getElementById('mesInput').onchange=gerarCalendario;

/* CHAMADA */
function renderChamada(){

  const el=document.getElementById('listaChamada');
  el.innerHTML='';

  Object.keys(unidades).forEach(u=>{

    el.innerHTML+=`
      <details class="border p-2 rounded-xl my-2">
        <summary class="font-black">${u}</summary>

        <div class="mt-2 space-y-2">
                   ${ordenarLista(unidades[u]||[]).map(m=>`
            <div onclick="toggle(this)"
              data-u="${u}" data-m="${m}"
              class="membro-ausente p-3 rounded-xl cursor-pointer">
              ${m}
            </div>
          `).join('')}
        </div>
      </details>
    `;
  });
}

window.toggle = el=>{
  el.classList.toggle('membro-presente');
  el.classList.toggle('membro-ausente');
};

window.toggleUnidades=()=>{
  document.querySelectorAll('details')
    .forEach(d=>d.open=!d.open);
};

/* SALVAR */
window.salvarChamada = async()=>{

  if(!dataSelecionada)
    return alert("Selecione data");

  const registros = {};

  document.querySelectorAll('[data-m]').forEach(b=>{

    const u = b.dataset.u;
    const m = b.dataset.m;

    if(!registros[u]) registros[u]=[];

    registros[u].push({
      nome:m,
      presente:b.classList.contains('membro-presente')
    });
  });

  const existente = chamadas.findIndex(
    c => c.data === dataSelecionada
  );

  if(existente >= 0){

    const confirmar = confirm(
      "Já existe chamada nesta data. Deseja substituir?"
    );

    if(!confirmar) return;

    chamadas[existente] = {
      data:dataSelecionada,
      registros
    };

  } else {

    chamadas.push({
      data:dataSelecionada,
      registros
    });
  }

  await save();

  alert("Chamada salva!");
};

/* UNIDADES */
window.addMembro = async ()=>{

  const u = document.getElementById('uNome').value.trim();
  const m = document.getElementById('mNome').value.trim();

  if(!u || !m) return alert("Preencha tudo");

  if(!unidades[u]) unidades[u]=[];

    unidades[u].push(m);

  unidades[u] = ordenarLista(unidades[u]);

  await save();

  document.getElementById('uNome').value='';
  document.getElementById('mNome').value='';
};

function renderUnidades(){

  const el = document.getElementById('unidades');
  el.innerHTML='';

  Object.keys(unidades).forEach(u=>{

    el.innerHTML+=`
      <div class="border rounded-xl p-3">
        <div class="flex justify-between items-center">
          <b class="text-[#31295C]">${u}</b>

          <div class="flex gap-2">
            <button onclick="editarUnidade('${u}')">✏️</button>
            <button onclick="excluirUnidade('${u}')" class="text-red-500">🗑️</button>
          </div>
        </div>

        <div class="mt-2 space-y-1">
                  ${ordenarLista(unidades[u]||[]).map((m,i)=>`
            <div class="flex justify-between text-sm">
              <span>${m}</span>
              <div class="flex gap-2">
                <button onclick="editarMembro('${u}',${i})">✏️</button>
                <button onclick="excluirMembro('${u}',${i})" class="text-red-500">🗑️</button>
              </div>
            </div>
          `).join('')}
        </div>
      </div>
    `;
  });
}

window.editarUnidade = (u)=>{
  const novo = prompt("Novo nome:",u);
  if(!novo || novo===u) return;

  unidades[novo]=unidades[u];
  delete unidades[u];
  save();
};

window.excluirUnidade = (u)=>{
  if(!confirm("Excluir unidade?")) return;
  delete unidades[u];
  save();
};

window.editarMembro = (u,i)=>{
  const novo = prompt("Novo nome:",unidades[u][i]);
  if(!novo) return;
  unidades[u][i]=novo;
  save();
};

window.excluirMembro = (u,i)=>{
  unidades[u].splice(i,1);
  save();
};

/* HISTÓRICO */
function renderHistorico(){

  const el=document.getElementById('historico');

  el.innerHTML=[...chamadas]
  .sort((a,b)=>b.data.localeCompare(a.data))
  .map((c,i)=>`

    <div class="flex justify-between border p-2 rounded-xl mb-2">

      <button onclick="abrirDetalhe(${i})">
        📅 ${c.data}
      </button>

      <button onclick="excluir(${i})" class="text-red-500">
        ✖
      </button>

    </div>

  `).join('');
}

window.excluir=async(i)=>{
  chamadas.splice(i,1);
  await save();
};

/* DETALHE COM EDIÇÃO */
window.abrirDetalhe=(i)=>{

  chamadaEditando = i;

  const c = chamadas[i];

  let html = `

    <div class="flex justify-between items-center mb-3">

      <h3 class="font-black">${c.data}</h3>

      <div class="flex gap-2">

        <button
          onclick="ativarEdicao()"
          class="bg-yellow-400 px-3 py-1 rounded-lg text-sm font-bold">
          ✏️ Editar
        </button>

        ${modoEdicao ? `
          <button
            onclick="salvarEdicao()"
            class="bg-green-600 text-white px-3 py-1 rounded-lg text-sm font-bold">
            💾 Salvar
          </button>
        ` : ''}

      </div>

    </div>
  `;

  Object.keys(c.registros).forEach(u=>{

    html += `
      <div class="border p-3 mb-3 rounded-xl">

        <b>${u}</b>

        <div class="mt-2 space-y-1">
    `;

    c.registros[u].forEach(m=>{

      html += `
        <div class="flex justify-between text-sm">

          <span>${m.nome}</span>

          <button
            ${modoEdicao ? '' : 'disabled'}
            onclick="toggleEdicao(this)"
            data-presente="${m.presente}"
            class="
              status-btn
              font-bold
              px-2 py-1 rounded-lg
              ${m.presente
                ? 'bg-green-100 text-green-700'
                : 'bg-red-100 text-red-600'}
            ">

            ${m.presente ? '✔ Presente' : '✖ Ausente'}

          </button>

        </div>
      `;
    });

    html += `
        </div>
      </div>
    `;
  });

  document.getElementById('modalContent').innerHTML = html;
  document.getElementById('modal').classList.remove('hidden');
};

/* ATIVAR EDIÇÃO */
window.ativarEdicao = ()=>{

  modoEdicao = true;

  abrirDetalhe(chamadaEditando);
};

/* TOGGLE STATUS */
window.toggleEdicao = (el)=>{

  if(!modoEdicao) return;

  const atual = el.dataset.presente === 'true';

  el.dataset.presente = (!atual).toString();

  if(atual){

    el.innerText = '✖ Ausente';

    el.classList.remove(
      'bg-green-100',
      'text-green-700'
    );

    el.classList.add(
      'bg-red-100',
      'text-red-600'
    );

  } else {

    el.innerText = '✔ Presente';

    el.classList.remove(
      'bg-red-100',
      'text-red-600'
    );

    el.classList.add(
      'bg-green-100',
      'text-green-700'
    );
  }
};

/* SALVAR EDIÇÃO */
window.salvarEdicao = async()=>{

  if(chamadaEditando === null) return;

  const c = chamadas[chamadaEditando];

  const botoes = document.querySelectorAll('.status-btn');

  let contador = 0;

  Object.keys(c.registros).forEach(u=>{

    c.registros[u].forEach(m=>{

      m.presente =
        botoes[contador].dataset.presente === 'true';

      contador++;
    });

  });

  chamadas[chamadaEditando] = c;

  await save();


  abrirDetalhe(chamadaEditando);

  alert('Chamada atualizada!');
};

window.fecharModal=()=>{

  modoEdicao = false;
  chamadaEditando = null;

  document.getElementById('modal')
    .classList.add('hidden');
};

/* RENDER GERAL */
function renderAll(){
  renderChamada();
  renderHistorico();
  renderUnidades();
}

/* INIT */
function init(){
  document.getElementById('mesInput').value=new Date().toISOString().slice(0,7);
  gerarCalendario();
}

init();
/* TEMA ESCURO */
window.toggleTema = ()=>{

  document.body.classList.toggle('dark-mode');

  const escuro =
    document.body.classList.contains('dark-mode');

  localStorage.setItem('temaEscuro', escuro);
};

if(localStorage.getItem('temaEscuro') === 'true'){
  document.body.classList.add('dark-mode');
}

/* RELATÓRIOS */
window.visualizarDados = ()=>{

  const ini = document.getElementById('ini').value;
  const fim = document.getElementById('fim').value;

  if(!ini || !fim){
    return alert("Selecione as datas");
  }

  const filtradas = chamadas.filter(c=>
    c.data >= ini && c.data <= fim
  );

  const totalChamadas = filtradas.length;

  const resultado = {};

  filtradas.forEach(chamada=>{

    Object.keys(chamada.registros).forEach(unidade=>{

      if(!resultado[unidade]){
        resultado[unidade] = {};
      }

      chamada.registros[unidade].forEach(membro=>{

        if(!resultado[unidade][membro.nome]){
          resultado[unidade][membro.nome] = 0;
        }

        if(membro.presente){
          resultado[unidade][membro.nome]++;
        }

      });

    });

  });

  const el = document.getElementById('resultadoRelatorio');

  if(totalChamadas === 0){
    el.innerHTML = `
      <div class="border rounded-xl p-4 text-center">
        Nenhuma chamada encontrada no período.
      </div>
    `;
    return;
  }

  let html = `
    <div class="bg-[#31295C] text-white p-3 rounded-xl font-bold">
      Total de chamadas no período: ${totalChamadas}
    </div>
  `;

  Object.keys(resultado).forEach(unidade=>{

    html += `
      <div class="border rounded-2xl p-4">

        <h3 class="font-black text-lg text-[#31295C] mb-3">
          ${unidade}
        </h3>

        <div class="space-y-2">
    `;

    Object.keys(resultado[unidade]).forEach(nome=>{

      const presencas = resultado[unidade][nome];

      html += `
        <div class="flex justify-between border-b pb-1 text-sm">
          <span>${nome}</span>
          <span class="font-bold">
            ${presencas}/${totalChamadas}
          </span>
        </div>
      `;
    });

    html += `
        </div>
      </div>
    `;
  });

  el.innerHTML = html;
};

</script>
<!-- RODAPÉ -->
<div id="rodape" class="text-center py-6 text-[#31295C] text-sm font-semibold opacity-80">
  <span class="italic tracking-wide">
    Feito com 💜 por
  </span>

  <span class="text-2xl ml-1"
    style="font-family: 'Parisienne', cursive;">
    Thauany Erthal
  </span>
</div>
</body>
</html>
